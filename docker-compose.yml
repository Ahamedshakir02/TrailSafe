version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tailsafe-dev
    ports:
      - "8081:8081"    # Metro bundler
      - "19000:19000"  # Expo dev server
      - "19001:19001"  # Expo debug protocol
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - EXPO_DEBUG=true
    command: npm start

  # Optional: Firebase emulator for local development
  firebase:
    image: node:18-alpine
    container_name: tailsafe-firebase
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "4000:4000"    # Firebase emulator suite UI
      - "5000:5000"    # Firebase functions emulator
      - "8085:8085"    # Firestore emulator
      - "9099:9099"    # Auth emulator
    command: npm install -g firebase-tools
    profiles:
      - firebase
